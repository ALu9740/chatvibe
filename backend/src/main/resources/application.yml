spring:
  profiles:
    active: dev
  application:
    name: chatvibe
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cache:
    type: caffeine
    cache-names:  userInfo,userEmail,emailExists

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080

jwt:
  # JWT 密钥：生产环境务必通过环境变量 JWT_SECRET 注入，至少 256 bits
  secret: ${JWT_SECRET:chatvibe-dev-secret-key-change-in-production-must-be-256-bits}
  access-token-expiration: 7200000      # 2小时
  refresh-token-expiration: 604800000   # 7天

chatvibe:
  ai:
    # AI 提供商: qwen（阿里云百炼） | ollama（本地） | openai
    provider: ${AI_PROVIDER:qwen}
    ollama:
      url: ${OLLAMA_URL:http://localhost:11434/api/chat}
      model: ${OLLAMA_MODEL:deepseek-r1:8b}
    openai:
      url: ${AI_API_BASE:https://api.openai.com/v1/chat/completions}
      api-key: ${AI_API_KEY:}
      model: ${AI_MODEL:gpt-4o-mini}
    # 阿里云百炼（DashScope）配置
    # 获取 API Key: https://bailian.console.aliyun.com/ -> 模型广场 -> API-KEY 管理
    qwen:
      url: ${QWEN_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
      api-key: ${QWEN_API_KEY:}
      model: ${QWEN_MODEL:qwen3.6-max-preview}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:}
    url-prefix: ${MINIO_URL_PREFIX:/minio}

resilience4j:
  ratelimiter:
    instances:
      loginRateLimiter:
        limit-for-period: 10          # 每周期最多 10 次
        limit-refresh-period: 1s      # 1 秒一周期 → 10 QPS
        timeout-duration: 0           # 超限不等待，直接拒绝
  circuitbreaker:
    instances:
      aiService:
        register-health-indicator: true
        sliding-window-size: 10              # 滑动窗口大小（最近10次请求）
        minimum-number-of-calls: 5           # 至少5次请求才开始计算失败率
        failure-rate-threshold: 50           # 失败率阈值50%触发熔断
        wait-duration-in-open-state: 30s     # 熔断开启后等待30秒尝试半开
        permitted-number-of-calls-in-half-open-state: 3  # 半开状态允许3次试探
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: COUNT_BASED
      registerService: # 新增：注册流程熔断器
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: COUNT_BASED
      loginService: # 新增：登录通知消费熔断
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        sliding-window-type: COUNT_BASED

