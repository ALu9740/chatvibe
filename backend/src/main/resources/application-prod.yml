# 生产环境配置（腾讯云轻量 2核4G 优化）
# 所有敏感信息通过环境变量注入，禁止在配置文件中硬编码
# 部署时在 systemd service 或启动脚本中设置环境变量

server:
  port: 8080
  tomcat:
    max-threads: 50
    min-spare-threads: 5
    accept-count: 20
    connection-timeout: 20000

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:chatvibe}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # 设置 MySQL 会话时区为 +08:00，确保 NOW() 返回北京时间
      connection-init-sql: SET time_zone = '+08:00'
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
  rabbitmq:
    host: ${RABBITMQ_HOST:}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:}
    password: ${RABBITMQ_PASSWORD:}
    virtual-host: /
  mail:
    host: smtp.163.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465
          starttls:
            enable: true

logging:
  level:
    root: warn
    com.chatvibe: info
    org.springframework.web: warn
  file:
    name: /opt/chatvibe/logs/chatvibe.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7

chatvibe:
  ai:
    # 生产环境使用阿里云百炼（DashScope）
    provider: qwen
    qwen:
      url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
      api-key: ${QWEN_API_KEY}
      model: qwen3.6-max-preview
